<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Add Transaction</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="max-w-md mx-auto min-h-screen flex flex-col shadow-xl bg-background-light dark:bg-background-dark">
        <!-- Top App Bar -->
        <div class="flex items-center p-4 justify-between border-b border-primary/10">
            <div class="flex size-10 shrink-0 items-center justify-center cursor-pointer">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">close</span>
            </div>
            <h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">New Transaction</h2>
            <div class="flex size-10 items-center justify-end">
                <button class="flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined font-bold">check</span>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 pb-8">
            <!-- Amount Input Section -->
            <div class="py-8 text-center">
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Enter Amount</p>
                <div class="flex items-center justify-center gap-1">
                    <span class="text-2xl font-bold text-primary">Rp</span>
                    <input
                        class="w-full max-w-[200px] bg-transparent border-none text-center text-5xl font-bold focus:ring-0 text-slate-900 dark:text-slate-100 p-0"
                        placeholder="0.00" type="text" />
                </div>
            </div>
            <!-- Type Toggle -->
            <div class="flex mb-6">
                <div
                    class="flex h-12 flex-1 items-center justify-center rounded-xl bg-primary/10 dark:bg-primary/5 p-1">
                    <label
                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-semibold transition-all">
                        <span>Expense</span>
                        <input checked="" class="hidden" name="transaction_type" type="radio" value="Expense" />
                    </label>
                    <label
                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-semibold transition-all">
                        <span>Income</span>
                        <input class="hidden" name="transaction_type" type="radio" value="Income" />
                    </label>
                </div>
            </div>
            <!-- OCR Prompt (Prominent Button) -->
            <button
                class="w-full mb-8 flex flex-col items-center justify-center p-6 border-2 border-dashed border-primary/30 rounded-xl bg-primary/5 hover:bg-primary/10 transition-colors group">
                <span
                    class="material-symbols-outlined text-primary text-4xl mb-2 group-hover:scale-110 transition-transform">receipt_long</span>
                <span class="font-bold text-primary">Scan Receipt / Upload Image</span>
                <span class="text-xs text-slate-500 mt-1">Automatic extraction using OCR</span>
            </button>
            <!-- Category Grid -->
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-3 px-1">Category
            </h3>
            <div class="grid grid-cols-4 gap-3 mb-8">
                <div class="flex flex-col items-center gap-2">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined">restaurant</span>
                    </div>
                    <span class="text-xs font-medium">Food</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">directions_car</span>
                    </div>
                    <span class="text-xs font-medium">Transport</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">shopping_bag</span>
                    </div>
                    <span class="text-xs font-medium">Shop</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">payments</span>
                    </div>
                    <span class="text-xs font-medium">Bills</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">movie</span>
                    </div>
                    <span class="text-xs font-medium">Fun</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">medical_services</span>
                    </div>
                    <span class="text-xs font-medium">Health</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">home</span>
                    </div>
                    <span class="text-xs font-medium">Home</span>
                </div>
                <div class="flex flex-col items-center gap-2 opacity-60">
                    <div
                        class="size-14 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
                        <span class="material-symbols-outlined">more_horiz</span>
                    </div>
                    <span class="text-xs font-medium">Other</span>
                </div>
            </div>
            <!-- Form Fields -->
            <div class="space-y-4">
                <div class="flex flex-col gap-1">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-1">Date</label>
                    <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl">
                        <span class="material-symbols-outlined text-slate-400">calendar_today</span>
                        <input class="bg-transparent border-none p-0 focus:ring-0 text-sm font-medium w-full"
                            type="text" value="Today, Oct 24 2023" />
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-1">Note</label>
                    <div class="flex items-start gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl">
                        <span class="material-symbols-outlined text-slate-400 mt-0.5">notes</span>
                        <textarea
                            class="bg-transparent border-none p-0 focus:ring-0 text-sm font-medium w-full resize-none"
                            placeholder="Add a description..." rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer Action -->
        <div class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
            <button
                class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/30 hover:opacity-90 active:scale-[0.98] transition-all">
                Save Transaction
            </button>
        </div>
    </div>
</body>

</html>
