name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Extract version from pubspec.yaml
        id: extract_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create and push tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete local tag if it exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG"
            echo "Deleted existing local tag: $TAG"
          fi

          # Create new tag
          git tag -a "$TAG" -m "Release $TAG"

          # Force push to overwrite remote tag if it exists
          git push origin "$TAG" --force
          echo "Created and pushed tag: $TAG"

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v$VERSION"

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --reverse)
          fi

          if [ -z "$COMMITS" ]; then
            CHANGELOG="Release $TAG"
          else
            CHANGELOG="## What's Changed\n\n$COMMITS"
          fi

          # Save changelog to file (multiline)
          echo "$CHANGELOG" > changelog.txt

          # Also set as output for single-line usage
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.extract_version.outputs.VERSION }}
          name: v${{ steps.extract_version.outputs.VERSION }}
          body_path: changelog.txt
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
