name: Release

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Skip workflow if triggered by a bump commit (prevents infinite loop)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skip-bump-commit:
    name: Check if bump commit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check commit message
        id: check
        run: |
          commit_msg=$(git log -1 --pretty=%s)
          if [[ "$commit_msg" == "chore: bump version to"* ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "Skipping workflow for bump commit: $commit_msg"
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
            echo "Proceeding with workflow for commit: $commit_msg"
          fi

  ci:
    name: CI (Test & Analyze)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.skip-bump-commit.outputs.should_skip == 'false'
    needs: skip-bump-commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Run analyzer
        run: flutter analyze

  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      new_version: ${{ steps.bump.outputs.new_version || '' }}
      should_bump: ${{ steps.check.outputs.should_bump || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get latest tag
        id: latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Latest tag: $latest_tag"

      - name: Check for version-worthy commits
        id: check
        run: |
          latest_tag="${{ steps.latest_tag.outputs.latest_tag }}"

          if [ -z "$latest_tag" ]; then
            # No tags yet, check all commits
            commits=$(git log --pretty=format:"%s")
          else
            # Check commits since last tag
            commits=$(git log ${latest_tag}..HEAD --pretty=format:"%s")
          fi

          # Exclude the bump commit itself if it exists
          commits=$(echo "$commits" | grep -v "^chore: bump version to")

          # Count commit types
          feat_count=$(echo "$commits" | grep -cE "^feat" || true)
          fix_count=$(echo "$commits" | grep -cE "^fix:" || true)
          breaking_count=$(echo "$commits" | grep -cE "BREAKING CHANGE" || true)
          feat_bang_count=$(echo "$commits" | grep -cE "^feat!" || true)

          echo "feat_count=$feat_count" >> $GITHUB_OUTPUT
          echo "fix_count=$fix_count" >> $GITHUB_OUTPUT
          echo "breaking_count=$breaking_count" >> $GITHUB_OUTPUT
          echo "feat_bang_count=$feat_bang_count" >> $GITHUB_OUTPUT
          echo "Found $feat_count feat commits, $fix_count fix commits, $breaking_count BREAKING CHANGE, $feat_bang_count feat!"

          # Determine if bump is needed
          if [ "$breaking_count" -gt 0 ] || [ "$feat_bang_count" -gt 0 ] || [ "$feat_count" -gt 0 ] || [ "$fix_count" -gt 0 ]; then
            echo "should_bump=true" >> $GITHUB_OUTPUT
          else
            echo "should_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine bump type
        id: bump_type
        if: steps.check.outputs.should_bump == 'true'
        run: |
          breaking_count="${{ steps.check.outputs.breaking_count }}"
          feat_bang_count="${{ steps.check.outputs.feat_bang_count }}"
          feat_count="${{ steps.check.outputs.feat_count }}"
          fix_count="${{ steps.check.outputs.fix_count }}"

          if [ "$breaking_count" -gt 0 ] || [ "$feat_bang_count" -gt 0 ]; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
            echo "Will bump MAJOR (found BREAKING CHANGE or feat!)"
          elif [ "$feat_count" -gt 0 ]; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            echo "Will bump MINOR (found feat: commits)"
          else
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            echo "Will bump PATCH (found fix: commits)"
          fi

      - name: Run bump_version.sh
        id: bump
        if: steps.check.outputs.should_bump == 'true'
        run: |
          bump_type="${{ steps.bump_type.outputs.bump_type }}"
          ./scripts/bump_version.sh --$bump_type

          # Extract new version from git tag
          new_tag=$(git describe --tags --abbrev=0)
          new_version="${new_tag#v}"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "Bumped to version: $new_version"

      - name: Push tag
        if: steps.check.outputs.should_bump == 'true'
        run: |
          # Get the new tag
          new_tag=$(git describe --tags --abbrev=0)
          echo "Pushing tag: $new_tag"

          # Push the commit and tag
          git push origin main
          git push origin "$new_tag"

      - name: Summary
        if: steps.check.outputs.should_bump == 'false'
        run: |
          echo "No version bump needed (no feat:, fix:, BREAKING CHANGE, or feat! commits found)"

  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    needs: version-bump
    if: needs.version-bump.outputs.should_bump == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.version-bump.outputs.new_version }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Get build number from git commit count
        id: build_number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUMBER"

      - name: Build release APK
        env:
          VERSION: ${{ needs.version-bump.outputs.new_version }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.BUILD_NUMBER }}
        run: |
          flutter build apk --release --build-name=$VERSION --build-number=$BUILD_NUMBER

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.version-bump.outputs.new_version }}"
          TAG="v$VERSION"

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Initialize changelog sections
          FEATURES=""
          BUG_FIXES=""
          PERFORMANCE=""
          REFACTORING=""
          CI_CD=""
          DOCUMENTATION=""
          OTHER=""
          BREAKING=""

          if [ -z "$PREV_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"%s|%b" --reverse)
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s|%b" --reverse)
          fi

          # Categorize commits
          while IFS='|' read -r subject body; do
            # Check for BREAKING CHANGE in subject or body
            if [[ "$subject" == *"BREAKING CHANGE"* ]] || [[ "$body" == *"BREAKING CHANGE"* ]]; then
              BREAKING="$BREAKING- $subject"$'\n'
            fi

            # Categorize by commit type
            if [[ "$subject" == feat!* ]]; then
              BREAKING="$BREAKING- $subject"$'\n'
            elif [[ "$subject" == feat:* ]]; then
              FEATURES="$FEATURES- $subject"$'\n'
            elif [[ "$subject" == fix:* ]]; then
              BUG_FIXES="$BUG_FIXES- $subject"$'\n'
            elif [[ "$subject" == perf:* ]]; then
              PERFORMANCE="$PERFORMANCE- $subject"$'\n'
            elif [[ "$subject" == refactor:* ]]; then
              REFACTORING="$REFACTORING- $subject"$'\n'
            elif [[ "$subject" == ci:* ]]; then
              CI_CD="$CI_CD- $subject"$'\n'
            elif [[ "$subject" == test:* ]]; then
              CI_CD="$CI_CD- $subject"$'\n'
            elif [[ "$subject" == docs:* ]]; then
              DOCUMENTATION="$DOCUMENTATION- $subject"$'\n'
            elif [[ "$subject" == chore:* ]] || [[ "$subject" == style:* ]]; then
              OTHER="$OTHER- $subject"$'\n'
            fi
          done <<< "$COMMITS"

          # Build changelog
          CHANGELOG="## What's Changed in $TAG"$'\n'$'\n'

          if [ -n "$BREAKING" ]; then
            CHANGELOG="$CHANGELOG### ⚠️ Breaking Changes"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$BREAKING"$'\n'
          fi

          if [ -n "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG### ✨ Features"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$FEATURES"$'\n'
          fi

          if [ -n "$BUG_FIXES" ]; then
            CHANGELOG="$CHANGELOG### 🐛 Bug Fixes"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$BUG_FIXES"$'\n'
          fi

          if [ -n "$PERFORMANCE" ]; then
            CHANGELOG="$CHANGELOG### ⚡ Performance"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$PERFORMANCE"$'\n'
          fi

          if [ -n "$REFACTORING" ]; then
            CHANGELOG="$CHANGELOG### ♻️ Refactoring"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$REFACTORING"$'\n'
          fi

          if [ -n "$CI_CD" ]; then
            CHANGELOG="$CHANGELOG### 🚀 CI/CD"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$CI_CD"$'\n'
          fi

          if [ -n "$DOCUMENTATION" ]; then
            CHANGELOG="$CHANGELOG### 📝 Documentation"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$DOCUMENTATION"$'\n'
          fi

          if [ -n "$OTHER" ]; then
            CHANGELOG="$CHANGELOG### 🔧 Other"$'\n'$'\n'
            CHANGELOG="$CHANGELOG$OTHER"$'\n'
          fi

          # Fallback if no commits
          if [ -z "$COMMITS" ]; then
            CHANGELOG="Release $TAG"
          fi

          # Save changelog to file
          echo "$CHANGELOG" > changelog.txt

          # Output for debugging
          cat changelog.txt

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          CHECKSUM=$(sha256sum "$APK_PATH" | awk '{print $1}')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "$CHECKSUM" > checksum.txt
          echo "SHA256: $CHECKSUM"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: v${{ needs.version-bump.outputs.new_version }}
          body_path: changelog.txt
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            checksum.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
