name: Auto Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get latest tag
        id: latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT
          echo "Latest tag: $latest_tag"

      - name: Check for feat or fix commits
        id: check_commits
        run: |
          latest_tag="${{ steps.latest_tag.outputs.latest_tag }}"

          if [ -z "$latest_tag" ]; then
            # No tags yet, check all commits
            commits=$(git log --pretty=format:"%s")
          else
            # Check commits since last tag
            commits=$(git log ${latest_tag}..HEAD --pretty=format:"%s")
          fi

          # Exclude the bump commit itself if it exists
          commits=$(echo "$commits" | grep -v "^chore: bump version to")

          # Check for feat or fix commits
          feat_count=$(echo "$commits" | grep -cE "^feat" || true)
          fix_count=$(echo "$commits" | grep -cE "^fix" || true)

          echo "feat_count=$feat_count" >> $GITHUB_OUTPUT
          echo "fix_count=$fix_count" >> $GITHUB_OUTPUT
          echo "Found $feat_count feat commits, $fix_count fix commits"

          if [ "$feat_count" -eq 0 ] && [ "$fix_count" -eq 0 ]; then
            echo "should_bump=false" >> $GITHUB_OUTPUT
          else
            echo "should_bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine bump type
        id: bump_type
        if: steps.check_commits.outputs.should_bump == 'true'
        run: |
          feat_count="${{ steps.check_commits.outputs.feat_count }}"
          fix_count="${{ steps.check_commits.outputs.fix_count }}"

          if [ "$feat_count" -gt 0 ]; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            echo "Will bump MINOR (found feat: commits)"
          else
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            echo "Will bump PATCH (found fix: commits)"
          fi

      - name: Run bump_version.sh
        id: bump
        if: steps.check_commits.outputs.should_bump == 'true'
        run: |
          bump_type="${{ steps.bump_type.outputs.bump_type }}"
          ./scripts/bump_version.sh --$bump_type

      - name: Push tag
        if: steps.check_commits.outputs.should_bump == 'true'
        run: |
          # Get the new tag
          new_tag=$(git describe --tags --abbrev=0)
          echo "Pushing tag: $new_tag"

          # Push the commit and tag
          git push origin main
          git push origin "$new_tag"

      - name: Summary
        if: steps.check_commits.outputs.should_bump == 'false'
        run: |
          echo "No version bump needed (no feat: or fix: commits found)"
